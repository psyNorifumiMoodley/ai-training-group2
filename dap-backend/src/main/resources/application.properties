spring.application.name=dap
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/dap
spring.datasource.username=dap
spring.datasource.password=dap
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# JWT
jwt.secret=dap-dev-secret-key-change-in-production-must-be-at-least-256-bits-long-so-we-pad-it
jwt.expiration-hours=24

# Assessment generation
assessment.doc-question-limit=1
assessment.required-mcq=5
assessment.required-mcq-plus=2
assessment.required-text=3
assessment.required-doc=1
assessment.required-group=1

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Invitation token
app.invitation-token.secret=${INVITATION_TOKEN_SECRET:invitation-secret-change-in-prod}

# Frontend
app.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:4200}

<nav [class]="navClasses()">
  <p class="text-overline text-[#6e7681] px-4 pt-4 pb-2 whitespace-nowrap">Manage</p>

  @for (item of visibleItems(); track item.route) {
    <a
      [routerLink]="item.route"
      routerLinkActive="bg-primary/15 !text-[#e6edf3] !border-primary"
      class="flex items-center gap-3 px-3 py-2 text-[#8b949e] text-caption rounded-md mx-2 mb-0.5
             border-l-2 border-transparent transition-all hover:bg-white/5 hover:text-[#c9d1d9] whitespace-nowrap">
      <i [class]="'pi text-[15px] flex-shrink-0 ' + item.icon"></i>
      <span>{{ item.label }}</span>
    </a>
  }
</nav>

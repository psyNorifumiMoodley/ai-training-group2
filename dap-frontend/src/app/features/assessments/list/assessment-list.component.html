<div class="flex items-center justify-between mb-4">
  <h1 class="text-h2 text-gray-900">Assessments</h1>
  <dap-button iconLeft="pi-plus">New assessment</dap-button>
</div>

<div class="bg-white border border-gray-200 rounded-card p-3.5">
  <table class="w-full text-caption">
    <thead>
      <tr class="border-b border-gray-100">
        <th class="text-left text-[0.6875rem] font-medium text-gray-400 pb-2 pr-4">Candidate</th>
        <th class="text-left text-[0.6875rem] font-medium text-gray-400 pb-2 pr-4">Role</th>
        <th class="text-left text-[0.6875rem] font-medium text-gray-400 pb-2 pr-4">Bank</th>
        <th class="text-left text-[0.6875rem] font-medium text-gray-400 pb-2 pr-4">Status</th>
        <th class="text-left text-[0.6875rem] font-medium text-gray-400 pb-2 pr-4">Assigned</th>
        <th class="text-left text-[0.6875rem] font-medium text-gray-400 pb-2">Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (a of assessments; track a.id) {
        <tr class="border-b border-gray-50 last:border-0 hover:bg-gray-50/50">
          <td class="py-2.5 pr-4">
            <div class="flex items-center gap-2">
              <dap-avatar [name]="a.candidateName" size="sm" />
              <span class="text-gray-800">{{ a.candidateName }}</span>
            </div>
          </td>
          <td class="py-2.5 pr-4 text-gray-500">{{ a.role }}</td>
          <td class="py-2.5 pr-4 text-gray-500">{{ a.bankName }}</td>
          <td class="py-2.5 pr-4"><dap-badge [status]="a.status" /></td>
          <td class="py-2.5 pr-4 text-gray-400">{{ a.assignedDate }}</td>
          <td class="py-2.5">
            @if (a.status === 'SUBMITTED' || a.status === 'MARKED') {
              <dap-button variant="ghost" size="sm">Mark</dap-button>
            }
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>

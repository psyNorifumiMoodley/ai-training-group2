services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: dap
      POSTGRES_USER: dap
      POSTGRES_PASSWORD: dap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dap"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./dap-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dap
      SPRING_DATASOURCE_USERNAME: dap
      SPRING_DATASOURCE_PASSWORD: dap
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./dap-frontend
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  postgres_data: